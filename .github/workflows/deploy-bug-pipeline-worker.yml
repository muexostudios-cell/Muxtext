name: Deploy Bug Pipeline Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/bug-pipeline/**'
      - '.github/workflows/deploy-bug-pipeline-worker.yml'
      - 'tools/cloudflare-resolve-account.sh'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare API token
        id: cf
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipped — add CLOUDFLARE_API_TOKEN in repo Settings → Secrets → Actions."
            echo ""
            echo "Quick setup (auto-resolves Account ID):"
            echo "  1. https://dash.cloudflare.com/profile/api-tokens → Create Token"
            echo "     Template: Edit Cloudflare Workers"
            echo "  2. On this VM: CLOUDFLARE_API_TOKEN=... bash tools/setup-cloudflare-auto.sh"
            echo "     Or add CLOUDFLARE_API_TOKEN to GitHub Secrets and re-run this workflow."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve Cloudflare Account ID
        if: steps.cf.outputs.ready == 'true'
        id: account
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            ACCOUNT_ID="$CLOUDFLARE_ACCOUNT_ID"
            echo "Using CLOUDFLARE_ACCOUNT_ID from secrets"
          else
            chmod +x tools/cloudflare-resolve-account.sh
            ACCOUNT_ID="$(bash tools/cloudflare-resolve-account.sh)"
            if [ -z "$ACCOUNT_ID" ]; then
              echo "::error::Could not resolve Account ID from API token"
              exit 1
            fi
            echo "Resolved Account ID from API token: $ACCOUNT_ID"
          fi
          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.ready == 'true'
        with:
          node-version: '20'

      - name: Deploy Cloudflare Worker
        if: steps.cf.outputs.ready == 'true'
        id: deploy
        working-directory: workers/bug-pipeline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.account.outputs.account_id }}
        run: |
          set -e
          npx wrangler deploy 2>&1 | tee /tmp/wrangler-bug-deploy.log
          URL=$(grep -oE 'https://muxtext-bug-pipeline\.[a-zA-Z0-9.-]+\.workers\.dev' /tmp/wrangler-bug-deploy.log | head -1 || true)
          if [ -z "$URL" ]; then
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' /tmp/wrangler-bug-deploy.log | grep muxtext-bug-pipeline | head -1 || true)
          fi
          if [ -n "$URL" ]; then
            echo "worker_url=$URL" >> "$GITHUB_OUTPUT"
            echo "Deployed bug pipeline worker: $URL"
          else
            echo "::warning::Deploy succeeded but workers.dev URL was not found in wrangler output"
          fi

      - name: Verify worker health
        if: steps.cf.outputs.ready == 'true' && steps.deploy.outputs.worker_url != ''
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          curl -fsS "$URL/health" | tee /tmp/bug-health.json
          grep -q '"ok":true' /tmp/bug-health.json

      - name: Worker URL hint
        if: steps.cf.outputs.ready == 'true'
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          if [ -n "$URL" ]; then
            echo "Patch index.html:"
            echo "  CLOUDFLARE_API_TOKEN=... bash tools/deploy-bug-pipeline-worker.sh"
            echo "Or full auto: CLOUDFLARE_API_TOKEN=... bash tools/setup-cloudflare-auto.sh"
          fi

      - name: Fail when worker deploy skipped on push
        if: steps.cf.outputs.ready != 'true' && github.event_name == 'push'
        run: |
          echo "::error::CLOUDFLARE_API_TOKEN missing — Bug Pipeline Worker was NOT deployed."
          echo "Add CLOUDFLARE_API_TOKEN to repo Secrets → Actions, then re-run this workflow."
          exit 1
