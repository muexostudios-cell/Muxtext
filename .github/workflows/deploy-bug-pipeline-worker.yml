name: Deploy Bug Pipeline Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'workers/bug-pipeline/**'
      - '.github/workflows/deploy-bug-pipeline-worker.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare secrets
        id: cf
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipped — add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo Settings → Secrets → Actions, then re-run this workflow (Actions → Deploy Bug Pipeline Worker → Run workflow)."
            echo ""
            echo "One-time setup:"
            echo "  1. https://dash.cloudflare.com/profile/api-tokens → Create Token"
            echo "     Template: Edit Cloudflare Workers + Account / Workers Scripts / Edit + Durable Objects / Edit"
            echo "  2. Account ID: Cloudflare dashboard right sidebar (or Workers overview URL)"
            echo "  3. Repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "  4. Re-run workflow or: CLOUDFLARE_API_TOKEN=... CLOUDFLARE_ACCOUNT_ID=... bash tools/deploy-bug-pipeline-worker.sh"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.cf.outputs.ready == 'true'
        with:
          node-version: '20'

      - name: Deploy Cloudflare Worker
        if: steps.cf.outputs.ready == 'true'
        id: deploy
        working-directory: workers/bug-pipeline
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          npx wrangler deploy 2>&1 | tee /tmp/wrangler-bug-deploy.log
          URL=$(grep -oE 'https://muxtext-bug-pipeline\.[a-zA-Z0-9.-]+\.workers\.dev' /tmp/wrangler-bug-deploy.log | head -1 || true)
          if [ -z "$URL" ]; then
            URL=$(grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' /tmp/wrangler-bug-deploy.log | grep muxtext-bug-pipeline | head -1 || true)
          fi
          if [ -n "$URL" ]; then
            echo "worker_url=$URL" >> "$GITHUB_OUTPUT"
            echo "Deployed bug pipeline worker: $URL"
          else
            echo "::warning::Deploy succeeded but workers.dev URL was not found in wrangler output"
          fi

      - name: Verify worker health
        if: steps.cf.outputs.ready == 'true' && steps.deploy.outputs.worker_url != ''
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          curl -fsS "$URL/health" | tee /tmp/bug-health.json
          grep -q '"ok":true' /tmp/bug-health.json

      - name: Worker URL hint
        if: steps.cf.outputs.ready == 'true'
        run: |
          URL="${{ steps.deploy.outputs.worker_url }}"
          if [ -n "$URL" ]; then
            echo "Update index.html BUG_PIPELINE_CONFIG.endpoint to:"
            echo "$URL"
            echo "Run locally to auto-patch index.html:"
            echo "  CLOUDFLARE_API_TOKEN=... CLOUDFLARE_ACCOUNT_ID=... bash tools/deploy-bug-pipeline-worker.sh"
          fi
